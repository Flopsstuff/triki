name: Release & publish triki-controller

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release
  id-token: write # required for npm OIDC trusted publishing (no NPM_TOKEN needed)

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/triki-controller
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false # keep GITHUB_TOKEN out of git config; npm uses OIDC, gh gets GH_TOKEN via env

      # Node 24 bundles npm >= 11.5.1, which OIDC trusted publishing requires.
      # An ad-hoc `npm install -g npm@…` upgrade did not reliably apply to the
      # publish step (it ran on npm 10 -> no OIDC -> anonymous -> 404), so pin
      # the Node version instead and use its bundled npm.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: packages/triki-controller/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Safety: on a tag push, ensure package.json version matches the tag.
      - name: Verify version matches tag
        if: github.event_name == 'push'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          PKG="$(node -p "require('./package.json').version")"
          if [ "$PKG" != "${TAG#v}" ]; then
            echo "::error::package.json ($PKG) != tag (${TAG#v})"
            exit 1
          fi

      # Manual runs can target any ref; only allow publishing from main so a
      # workflow_dispatch never ships unreleased code from a feature branch.
      - name: Verify manual runs target main
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error::workflow_dispatch publishing is only allowed from main"
            exit 1
          fi

      # prepublishOnly runs `typecheck` + `build`; provenance is auto-attached
      # by npm under trusted publishing. A prerelease version (one with a hyphen,
      # e.g. 0.2.0-alpha.0) goes to the `next` dist-tag so it never becomes the
      # `latest` that `npm i triki-controller` resolves to; stable -> `latest`.
      - name: Publish to npm
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          case "$VERSION" in
            *-*) echo "Prerelease $VERSION -> dist-tag 'next'"; npm publish --tag next --provenance ;;
            *)   echo "Stable $VERSION -> dist-tag 'latest'";   npm publish --provenance ;;
          esac

      # Cut a GitHub Release for the tag. Notes are auto-generated by GitHub from
      # the PRs / commits merged since the previous release. Skipped on manual
      # dispatch (no tag to release).
      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # Mark prerelease tags (v*-alpha.*, v*-beta.*, …) as GitHub pre-releases.
          PRE=""
          case "$TAG" in *-*) PRE="--prerelease" ;; esac
          gh release create "$TAG" --title "$TAG" --generate-notes --verify-tag $PRE
