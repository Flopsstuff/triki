name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publishing via the gh-pages branch needs only contents:write, which the default
# GITHUB_TOKEN has. On a public repo, the first push to gh-pages auto-enables Pages.
permissions:
  contents: write

concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so VitePress lastUpdated timestamps work
          lfs: true # pull LFS-tracked device photos so they render

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
          # Adds .nojekyll automatically so VitePress assets are served as-is.
